
<!DOCTYPE html>
<html>
<head>
<title>Closure Editor</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>Closure Editor</h1>

<div class="toolbar">

<input id="closureName"
placeholder="Closure Name"

onchange="
workspaceState.closureName =
this.value
">
<input
id="inCableName"
placeholder="IN Cable Name">
<select id="inSize">
<option>48</option>
<option>96</option>
<option selected>144</option>
<option>288</option>
</select>

<button onclick="createInCable()">
Create IN Cable
</button>

<select id="outCableSize">

<option value="12">12F</option>
<option value="24">24F</option>
<option value="48" selected>48F</option>
<option value="96">96F</option>
<option value="144">144F</option>
<option value="288">288F</option>

</select>

<button onclick="addOutCable()">
Add OUT Cable
</button>

<button onclick="addThroughCable()">
Add Through Cable
</button>

<button onclick="saveClosure()">
Save
</button>

<a class="btn" href="/">
Dashboard
</a>

</div>

<div id="workspace"></div>

<div class="pool-panel">

<h3>OUT Cable Pools</h3>

<div id="poolGrid"
class="pool-grid"></div>

</div>

{% if closure %}

<div class="card">

<h3>Stored Database JSON</h3>

<pre id="storedJson">
{{ closure.data | tojson(indent=2) }}
</pre>

</div>

{% endif %}

<script>

const COLORS = [
["Blue","#2563eb"],
["Orange","#f97316"],
["Green","#16a34a"],
["Brown","#8b5a2b"],
["Slate","#9ca3af"],
["White","#ffffff"],
["Red","#dc2626"],
["Black","#111111"],
["Yellow","#facc15"],
["Violet","#9333ea"],
["Rose","#ec4899"],
["Aqua","#06b6d4"]
];

let closureId =
{{ closure.id if closure else 'null' }};

let workspaceState =
{% if closure %}
{{ closure.data|tojson }}
{% else %}
{
    closureName:"",

    inCable:null,

    outCables:[],

    throughCables:[],

    mappings:[],

    splitters:[],

    cableRegistry:[],

    editingCable:null
}
{% endif %};

function uid(){

    return 'id-' +
        Math.random()
        .toString(36)
        .substr(2,9) +

        '-' +

        Date.now();
}

function registerCable(cable){

    if(!workspaceState.cableRegistry){

        workspaceState.cableRegistry = [];
    }

    const existing =
        workspaceState.cableRegistry.find(
            c=>c.cableName===cable.cableName
        );

    if(existing){

        existing.size =
            cable.size;

        existing.role =
            cable.role;

        existing.sourceClosure =
            cable.sourceClosure;

        existing.destinationClosure =
            cable.destinationClosure;

        return;
    }

    workspaceState.cableRegistry.push({

        cableName:cable.cableName,

        size:cable.size,

        role:cable.role,

        sourceClosure:
            cable.sourceClosure || "",

        destinationClosure:
            cable.destinationClosure || ""
    });
}


function openCableEditor(
    type,
    cableId
){

    let cable = null;

    if(type==="out"){

        cable =
            workspaceState.outCables.find(
                c=>c.id===cableId
            );

    }else{

        cable =
            workspaceState.throughCables.find(
                c=>c.id===cableId
            );
    }

    if(!cable)
        return;

    workspaceState.editingCable = {

        type:type,

        cableId:cableId
    };

    renderAll();
}

function closeCableEditor(){

    workspaceState.editingCable = null;

    renderAll();
}

function getNextBranchLetter(){

    const letters =
        "abcdefghijklmnopqrstuvwxyz";

    return letters[
        workspaceState.outCables.length
    ] || "x";
}

function createInCable(){

    workspaceState.closureName =

        document.getElementById(
            "closureName"
        ).value;

    const cableName =

        document.getElementById(
            "inCableName"
        ).value;

    workspaceState.inCable = {

        cableName:cableName,

        size: parseInt(

            document.getElementById(
                "inSize"
            ).value
        )
    };

    registerCable({

        cableName:
            cableName,

        size:
            workspaceState.inCable.size,

        role:"feeder",

        sourceClosure:"",

        destinationClosure:
            workspaceState.closureName
    });

    renderAll();
}

function isOutStrandUsed(
    outCable,
    outBuffer,
    outStrand
){

    return workspaceState.mappings.some(

        m =>

            (
                m.mappingType === "strand" ||

                m.mappingType ===
                "splitter-output"
            )

            &&

            m.outCable === outCable

            &&

            Number(
                m.outBuffer
            ) === Number(outBuffer)

            &&

            Number(
                m.outStrand
            ) === Number(outStrand)
    );
}


function getStrandMapping(
    inBuffer,
    inStrand
){

    return workspaceState.mappings.find(
        m=>

            m.mappingType==="strand" &&

            m.inBuffer===inBuffer &&

            m.inStrand===inStrand
    );
}


function getSplitter(
    inBuffer,
    inStrand
){

    return workspaceState.splitters.find(
        s=>

            s.inBuffer===inBuffer &&

            s.inStrand===inStrand
    );
}

function getSplitterOutputUsage(
    splitterId,
    port
){

    return workspaceState.mappings.find(
        m=>

            m.mappingType==="splitter-output" &&

            m.splitterId===splitterId &&

            m.port===port
    );
}

function getSplitterOutput(
    splitterId,
    port
){

    const splitter =
        workspaceState.splitters.find(
            s=>s.id===splitterId
        );

    if(!splitter)
        return null;

    return splitter.outputs.find(
        o=>o.port===port
    );
}

function removeStrandMapping(
    inBuffer,
    inStrand
){

    const mapping =
        getStrandMapping(
            inBuffer,
            inStrand
        );

    if(!mapping)
        return;

    mapping.outCable = null;

    mapping.outBuffer = null;

    mapping.outStrand = null;

    if(mapping.status==="Spliced"){

        mapping.status = "Open";
    }

    renderInCable();

    renderPools();
}

function clearStrandRecord(
    inBuffer,
    inStrand
){

    workspaceState.mappings =
        workspaceState.mappings.filter(
            m=>!(
                m.mappingType==="strand" &&
                m.inBuffer===inBuffer &&
                m.inStrand===inStrand
            )
        );

    renderInCable();

    renderPools();
}

function addSplitter(
    inBuffer,
    inStrand
){

    const existing =
        getSplitter(
            inBuffer,
            inStrand
        );

    if(existing){

        alert(
            "Splitter already exists on this strand."
        );

        return;
    }

    workspaceState.splitters.push({

        id:uid(),

        splitterRatio:"1:8",

        inBuffer:inBuffer,

        inStrand:inStrand,

        outputs:[
            {
                port:1,
                description:""
            },
            {
                port:2,
                description:""
            },
            {
                port:3,
                description:""
            },
            {
                port:4,
                description:""
            },
            {
                port:5,
                description:""
            },
            {
                port:6,
                description:""
            },
            {
                port:7,
                description:""
            },
            {
                port:8,
                description:""
            }
        ]
    });

    const mapping =
        getStrandMapping(
            inBuffer,
            inStrand
        );

    if(mapping){

        mapping.status =
            "Splitter Input";

    }else{

        workspaceState.mappings.push({

            mappingType:"strand",

            inBuffer:inBuffer,

            inStrand:inStrand,

            outCable:null,

            outBuffer:null,

            outStrand:null,

            description:"",

            status:"Splitter Input"
        });
    }

    renderInCable();
}

function removeSplitter(
    inBuffer,
    inStrand
){

    const splitter =
        getSplitter(
            inBuffer,
            inStrand
        );

    if(!splitter)
        return;

    workspaceState.splitters =
        workspaceState.splitters.filter(
            s=>s.id!==splitter.id
        );

    workspaceState.mappings =
        workspaceState.mappings.filter(
            m=>!(

                m.mappingType==="splitter-output" &&

                m.splitterId===splitter.id
            )
        );

    const strandMapping =
        getStrandMapping(
            inBuffer,
            inStrand
        );

    if(strandMapping){

        if(
            !strandMapping.outCable &&
            !strandMapping.description
        ){

            strandMapping.status = "Open";

        }else{

            strandMapping.status = "Spliced";
        }
    }

    renderInCable();

    renderPools();
}

function removeSplitterOutput(
    splitterId,
    port
){

    workspaceState.mappings =
        workspaceState.mappings.filter(
            m=>!(

                m.mappingType==="splitter-output" &&

                m.splitterId===splitterId &&

                m.port===port
            )
        );

    renderInCable();

    renderPools();
}

function removeMapping(buffer){

    workspaceState.mappings =
        workspaceState.mappings.filter(
            m=>m.buffer!==buffer
        );

    renderInCable();
    renderPools();
}

function addOutCable(){

    const id =
        workspaceState.outCables.length + 1;

    const size =
        parseInt(
            document.getElementById(
                "outCableSize"
            ).value
        );

const branchLetter =
    getNextBranchLetter();

const parentCable =
    workspaceState.inCable
    ?.cableName || "UNKNOWN";

const generatedName =

    parentCable +

    "/" +

    workspaceState.closureName +

    branchLetter;

const cable = {

    id:uid(),

    branchLetter:branchLetter,

    cableName:generatedName,

    parentCable:parentCable,

    fromClosure:
        workspaceState.closureName,

    toClosure:"",

    role:"branch",

    size:size
};

workspaceState.outCables.push(
    cable
);

registerCable({

    cableName:
        cable.cableName ||

        ("OUT-"+cable.id),

    size:cable.size,

    role:cable.role,

    sourceClosure:
        workspaceState.closureName,

    destinationClosure:""
});

    renderPools();
}

function addThroughCable(){

    const id =
        workspaceState
        .throughCables.length + 1;

    const size =
        parseInt(
            document.getElementById(
                "inSize"
            ).value
        );

const parentCable =
    workspaceState.inCable
    ?.cableName || "UNKNOWN";

const cable = {

    id:uid(),

    cableName:parentCable,

    parentCable:parentCable,

    fromClosure:
        workspaceState.closureName,

    toClosure:"",

    role:"through",

    size:size
};

        workspaceState.throughCables.push(
            cable
        );

        registerCable({

            cableName:
                cable.cableName ||

                ("THROUGH-"+cable.id),

            size:cable.size,

            role:cable.role,

            sourceClosure:
                workspaceState.closureName,

            destinationClosure:""
        });

    const buffers = size / 12;

    for(let b=1;b<=buffers;b++){

        const existing =
            workspaceState.mappings.find(
                m=>m.buffer===b
            );

        if(!existing){

            workspaceState.mappings.push({
                buffer:b,
                outCable:"THROUGH-"+id,
                outBuffer:b,
                label:
                    "THROUGH-"+id+
                    " • Buffer "+b,
                description:"",
                status:"Straight Through"
            });
        }
    }

    renderAll();
}

function renderAll(){

    renderInCable();
    renderPools();
}

function renderInCable(){

    if(!workspaceState.inCable)
        return;

    if(!workspaceState.expandedBuffers)
        workspaceState.expandedBuffers = [];

    const buffers =
        workspaceState.inCable.size / 12;

    let html = `
    <div class="card">

    <div class="header">
        IN Cable
    </div>

    <table>

    <thead>
    <tr>
        <th></th>
        <th>Buffer / Strand</th>
        <th>#</th>
        <th>Cable #</th>
<th>Expand</th>
<th>Status</th>
<th>Mapping</th>
<th>Description</th>
    </tr>
    </thead>

    <tbody>
    `;

    for(let b=1;b<=buffers;b++){

        const color =
            COLORS[(b-1)%12][1];

        const start =
            ((b-1)*12)+1;

        const end =
            b*12;

        const expanded =
            workspaceState
            .expandedBuffers
            .includes(b);

        let rowspanCount = 1;

if(expanded){

    rowspanCount += 12;

    for(let f=1;f<=12;f++){

        const splitter =
            getSplitter(b,f);

        if(splitter){

            rowspanCount += 8;
        }
    }
}

        const mapping =
            workspaceState.mappings.find(
                m=>m.buffer===b
            );

        html += `
        <tr class="buffer-row">

        <td
class="color-col"
rowspan="${rowspanCount}">

    <div class="fill-full"
    style="
        background:${color}
    ">
    </div>

</td>

        <td>
            Buffer ${b}
        </td>

        <td>
            ${b}
        </td>

        <td>
            ${start}-${end}
        </td>

        <td>

            <button
            onclick="
                toggleBuffer(${b})
            ">

            ${
                expanded
                ? "Collapse"
                : "Expand"
            }

            </button>

        </td>
<td>

<select
onchange="
    updateStatus(
        ${b},
        this.value
    )
">

<option
value="Open"

${
    !mapping ||
    !mapping.status ||
    mapping.status==="Open"
    ? "selected"
    : ""
}>
Open
</option>

<option
value="Spliced"

${
    mapping &&
    mapping.status==="Spliced"
    ? "selected"
    : ""
}>
Spliced
</option>

<option
value="Straight Through"

${
    mapping &&
    mapping.status==="Straight Through"
    ? "selected"
    : ""
}>
Straight Through
</option>

</select>

</td>
        <td>

            <div
            class="drop-zone"
            ondragover="
                event.preventDefault()
            "
            ondrop="
                handleDrop(
                    event,
                    ${b}
                )
            ">

            ${
                mapping
                ? `
                <div class="badge">

    <span>
        ${mapping.label}
    </span>

    <button
    class="remove-map"
    onclick="
        removeMapping(${b})
    ">
        ×
    </button>

</div>
                `
                : "Drop Buffer"
            }

            </div>

        </td>

        <td>

            <input
            value="${
                mapping
                ? mapping.description
                : ""
            }"
            onchange="
                updateDescription(
                    ${b},
                    this.value
                )
            ">

        </td>

        </tr>
        `;

        if(expanded){

            for(let f=1;f<=12;f++){

                const strandColor =
                    COLORS[f-1][1];

                const strandName =
                    COLORS[f-1][0];

                const cableFiber =
                    ((b-1)*12)+f;

const strandMapping =
    getStrandMapping(b,f);

    const splitter = getSplitter(b,f);

html += `
<tr class="
    strand-row
    ${strandMapping ? 'strand-mapped' : ''}
">

<td class="indent">

    <div class="
        strand-wrap
    ">

    <div class="
        strand-color
    "
    style="
        background:${strandColor}
    ">
    </div>

    ${strandName}

    </div>

</td>

<td>
    ${f}
</td>

<td>
    ${cableFiber}
</td>

<td>

<select

onchange="
    updateStrandStatus(
        ${b},
        ${f},
        this.value
    )
">

<option
value="Open"

${
    !strandMapping ||
    !strandMapping.status ||
    strandMapping.status==="Open"
    ? "selected"
    : ""
}>
Open
</option>

<option
value="Spliced"

${
    strandMapping &&
    strandMapping.status==="Spliced"
    ? "selected"
    : ""
}>
Spliced
</option>

<option
value="Reserved"

${
    strandMapping &&
    strandMapping.status==="Reserved"
    ? "selected"
    : ""
}>
Reserved
</option>

<option
value="Damaged"

${
    strandMapping &&
    strandMapping.status==="Damaged"
    ? "selected"
    : ""
}>
Damaged
</option>

</select>

</td>

<td>

    <div
    class="
        drop-zone
    "

    ondragover="
        event.preventDefault()
    "

    ondrop="
        handleStrandDrop(
            event,
            ${b},
            ${f}
        )
    ">

${
    strandMapping &&
    strandMapping.outCable

    ? `
    <div class="badge">

        <span>

            ${strandMapping.outCable}

            •

            B${strandMapping.outBuffer}

            •

            S${strandMapping.outStrand}

        </span>
<button
class="remove-map"

title="Remove Splice"

onclick="
    removeStrandMapping(
        ${b},
        ${f}
    )
">
    ×
</button>

<button
class="remove-map"

title="Clear Strand"

onclick="
    clearStrandRecord(
        ${b},
        ${f}
    )
">
    !
</button>

    </div>
    `

    : (
    splitter

? `

<div class="badge">

    <span>

        1:8 Splitter

    </span>

    <button
    class="remove-map"

    title="Remove Splitter"

    onclick="
        removeSplitter(
            ${b},
            ${f}
        )
    ">
        ×
    </button>

</div>

`

    : (

        strandMapping
        ? strandMapping.status
        : "Drop Strand"
    )
)
}

    </div>

</td>

<td>

<div style="
    display:flex;
    gap:6px;
    align-items:center;
">

<input

value="${
    strandMapping
    ? strandMapping.description || ""
    : ""
}"

placeholder="
    Strand Description
"

onchange="
    updateStrandDescription(
        ${b},
        ${f},
        this.value
    )
">

<button

onclick="
    addSplitter(
        ${b},
        ${f}
    )
">

1:8

</button>

</div>

</td>

</tr>
`;

if(splitter){

    for(let p=1;p<=8;p++){

        const outputUsage =
    getSplitterOutputUsage(
        splitter.id,
        p
    );

        html += `

<tr class="
    splitter-port-row
    ${outputUsage ? 'splitter-port-used' : ''}
">

    <td></td>

    <td class="indent">

        <div class="
            strand-wrap
        ">

            <div class="
                strand-color
            "
            style="
                background:${strandColor}
            ">
            </div>

            Splitter Port ${p}

        </div>

    </td>

    <td>
        ${p}
    </td>

    <td>
        -
    </td>

    <td>
        -
    </td>

    <td>

        Splitter Output

    </td>

    <td>

        <div class="
            drop-zone
        "

        ondragover="
            event.preventDefault()
        "

        ondrop="
            handleSplitterDrop(
                event,
                '${splitter.id}',
                ${p}
            )
        ">

            ${
                outputUsage

                ? `

                <div class="badge">

    <span>

        ${outputUsage.outCable}

        •

        B${outputUsage.outBuffer}

        •

        S${outputUsage.outStrand}

    </span>

    <button
    class="remove-map"

    title="Remove Output"

    onclick="
        removeSplitterOutput(
            '${splitter.id}',
            ${p}
        )
    ">
        ×
    </button>

</div>

                `

                : "Drop Strand"
            }

        </div>

    </td>

    <td>

        <input

value="${
    getSplitterOutput(
        splitter.id,
        p
    )?.description || ""
}"

placeholder="
    Port Description
"

onchange="
    updateSplitterOutputDescription(
        '${splitter.id}',
        ${p},
        this.value
    )
">

    </td>

</tr>
        `;
    }
}
            }
        }
    }

    html += `
    </tbody>
    </table>
    </div>
    `;

    document.getElementById(
        "workspace"
    ).innerHTML = html;
}

function toggleBuffer(buffer){

    if(!workspaceState.expandedBuffers)
        workspaceState.expandedBuffers = [];

    const index =
        workspaceState
        .expandedBuffers
        .indexOf(buffer);

    if(index > -1){

        workspaceState
        .expandedBuffers
        .splice(index,1);

    }else{

        workspaceState
        .expandedBuffers
        .push(buffer);
    }

    renderInCable();
}

function renderPools(){

    let html = "";

    workspaceState.outCables.forEach(
        cable=>{

            const buffers =
                cable.size / 12;

            html += `
            <div class="pool-card">

            <div class="header">
               ${cable.cableName || ("OUT-"+cable.id)}
            </div>
                <div class="pool-body">

                <div class="pool-meta">

                    <div>

                        <strong>
                            ${cable.cableName}
                        </strong>

                    </div>

                    <div class="pool-route">

                        ${cable.fromClosure || "?"}

                        →

                        ${cable.toClosure || "?"}

                    </div>

                </div>

                <button

                onclick="
                    openCableEditor(
                        'out',
                        '${cable.id}'
                    )
                ">

                Edit

                </button>

            `;

            for(let b=1;b<=buffers;b++){

                const color =
                    COLORS[(b-1)%12][1];

                const bufferUsed =
    isOutBufferUsed(
        cable.cableName,
        b
    );

                html += `

                <div class="
    pool-item
    ${bufferUsed ? 'buffer-used' : ''}
">

                    <div class="
                        color-col
                    ">

                        <div class="fill"
                        style="
                            background:${color}
                        ">
                        </div>

                    </div>

                    <div style="
                        padding:10px
                    ">

                        <div

                        draggable="true"

                        ondragstart="
                            dragStart(
                                event,
                                '${cable.cableName || ("OUT-"+cable.id)}',
                                ${b}
                            )
                        ">

                            Buffer ${b}

${
    bufferUsed

    ? `
    <span class="
        strand-badge used
    ">
        BUFFER USED
    </span>
    `

    : ""
}

                        </div>
                `;

for(let s=1;s<=12;s++){

    const strandColor =
        COLORS[s-1][1];

    const strandName =
        COLORS[s-1][0];

const strandUsage =
    getOutStrandUsage(
        cable.cableName,
        b,
        s
    );

const strandUsed =
    !!strandUsage ||
    bufferUsed;

const strandIsSplitter =
    strandUsage &&
    strandUsage.mappingType ===
    "splitter-output";

const strandLockedByBuffer =
    bufferUsed &&
    !strandUsage;


  html += `

<div

class="
strand-pool-item
${strandUsed ? 'used' : ''}
"

draggable="${
    strandUsed
    ? "false"
    : "true"
}"

ondragstart="
    dragStrandStart(
        event,
        '${cable.cableName || ("OUT-"+cable.id)}',
        ${b},
        ${s}
    )
">

    <div style="
        display:flex;
        justify-content:space-between;
        align-items:center;
        width:100%;
    ">

        <div style="
            display:flex;
            align-items:center;
            gap:8px;
        ">

            <div
            class="strand-mini-color"

            style="
                background:${strandColor}
            ">
            </div>

            <span>

                ${s}
                -
                ${strandName}

            </span>

        </div>

${
    strandUsed

    ? (

        strandLockedByBuffer

        ? `
        <span class="
            strand-badge used
        ">
            BUF
        </span>
        `

        : (

            strandIsSplitter

            ? `
            <span class="
                strand-badge splitter
            ">
                SPL
            </span>
            `

            : `
            <span class="
                strand-badge used
            ">
                USED
            </span>
            `
        )
    )

    : ""
}

    </div>

</div>

`;
}

                html += `

                    </div>

                </div>
                `;
            }

            html += `
            </div>
            </div>
            `;
        }
    );

    workspaceState.throughCables.forEach(
        cable=>{

            const buffers =
                cable.size / 12;

            html += `
            <div class="pool-card">

            <div class="header">
                ${cable.cableName || ("THROUGH-"+cable.id)}
            </div>

            <div class="pool-body">

<div class="pool-meta">

    <div>

        <strong>
            ${cable.cableName}
        </strong>

    </div>

    <div class="pool-route">

        ${cable.fromClosure || "?"}

        →

        ${cable.toClosure || "?"}

    </div>

</div>

<button

onclick="
    openCableEditor(
        'through',
        '${cable.id}'
    )
">

Edit

</button>
                
            `;

            for(let b=1;b<=buffers;b++){

                const color =
                    COLORS[(b-1)%12][1];

                html += `

                <div class="
                    pool-item
                ">

                    <div class="
                        color-col
                    ">

                        <div class="fill"
                        style="
                            background:${color}
                        ">
                        </div>

                    </div>

                    <div style="
                        padding:10px
                    ">

                        Buffer ${b}

                        <span style="
                            color:#64748b;
                            font-size:11px;
                            margin-left:8px;
                        ">

                            Straight Through

                        </span>

                    </div>

                </div>
                `;
            }

            html += `
            </div>
            </div>
            `;
        }
    );

if(workspaceState.editingCable){

    let cable = null;

    if(
        workspaceState
        .editingCable
        .type==="out"
    ){

        cable =
            workspaceState.outCables.find(
                c=>

                c.id===workspaceState
                    .editingCable
                    .cableId
            );

    }else{

        cable =
            workspaceState.throughCables.find(
                c=>

                c.id===workspaceState
                    .editingCable
                    .cableId
            );
    }

    if(cable){

        html += `

        <div class="modal-backdrop">

            <div class="modal">

                <div class="header">

                    Edit Cable

                </div>

                <input

                value="${
                    cable.cableName || ""
                }"

                onchange="
                    updateCableField(
                        '${cable.id}',
                        'cableName',
                        this.value
                    )
                "

                placeholder="
                    Cable Name
                ">

                <input

                value="${
                    cable.toClosure || ""
                }"

                onchange="
                    updateCableField(
                        '${cable.id}',
                        'toClosure',
                        this.value
                    )
                "

                placeholder="
                    Destination Closure
                ">

                <button
                onclick="
                    closeCableEditor()
                ">
                    Close
                </button>

            </div>

        </div>
        `;
    }
}

document.getElementById(
    "poolGrid"
).innerHTML = html;
}

function dragStart(
    event,
    cable,
    buffer
){

    event.dataTransfer.setData(
        "text/plain",

        JSON.stringify({
            cableName:cable,
            buffer
        })
    );
}

function dragStrandStart(
    event,
    cableName,
    buffer,
    strand
){

    event.dataTransfer.setData(
        "text/plain",

        JSON.stringify({

            type:"strand",

            cableName:cableName,

            buffer:buffer,

            strand:strand
        })
    );
}

function handleSplitterDrop(
    event,
    splitterId,
    port
){

    event.preventDefault();

    const data =
        JSON.parse(
            event.dataTransfer.getData(
                "text/plain"
            )
        );

    if(data.type!=="strand")
        return;

    const existing =
        getOutStrandUsage(
            data.cableName,
            data.buffer,
            data.strand
        );

    if(existing){

        alert(
            "That OUT strand is already mapped."
        );

        return;
    }

    workspaceState.mappings =
        workspaceState.mappings.filter(
            m=>!(
                m.mappingType==="splitter-output" &&
                m.splitterId===splitterId &&
                m.port===port
            )
        );

        if(

    isOutStrandUsed(
        data.outCable,
        data.outBuffer,
        data.outStrand
    )
){

    alert(
        "That OUT strand is already used."
    );

    return;
}

    workspaceState.mappings.push({

        mappingType:"splitter-output",

        splitterId:splitterId,

        port:port,

        outCable:data.cableName,

        outBuffer:data.buffer,

        outStrand:data.strand,

        status:"Splitter Output",

        description:""
    });

    renderInCable();

    renderPools();
}

function getOutStrandUsage(
    outCable,
    outBuffer,
    outStrand
){

    return workspaceState.mappings.find(

        m =>

            (
                m.mappingType === "strand" ||

                m.mappingType ===
                "splitter-output"
            )

            &&

            m.outCable === outCable

            &&

            Number(
                m.outBuffer
            ) === Number(outBuffer)

            &&

            Number(
                m.outStrand
            ) === Number(outStrand)
    );
}

function handleStrandDrop(
    event,
    inBuffer,
    inStrand
){

    event.preventDefault();

    const data =
        JSON.parse(
            event.dataTransfer.getData(
                "text/plain"
            )
        );

    if(

    isOutBufferUsed(
        data.outCable,
        data.outBuffer
    )
){

    alert(
        "That OUT buffer is already assigned."
    );

    return;
}

    if(data.type!=="strand")
        return;

    const existingOutUsage =
    getOutStrandUsage(
        data.cableName,
        data.buffer,
        data.strand
    );

    if(existingOutUsage){

        alert(
            "That OUT strand is already mapped."
        );

        return;
    }

    workspaceState.mappings =
        workspaceState.mappings.filter(
            m=>!(
                m.mappingType==="strand" &&
                m.inBuffer===inBuffer &&
                m.inStrand===inStrand
            )
        );

    if(

        isOutStrandUsed(
            data.outCable,
            data.outBuffer,
            data.outStrand
        )
    ){

        alert(
            "That OUT strand is already used."
        );

        return;
    }

    workspaceState.mappings.push({

        mappingType:"strand",

        inBuffer:inBuffer,

        inStrand:inStrand,

        outCable:data.cableName,

        outBuffer:data.buffer,

        outStrand:data.strand,

        description:"",

        status:"Spliced"
    });

    renderInCable();
    renderPools();
}

function handleDrop(
    event,
    inBuffer
){

    event.preventDefault();

    const data =
        JSON.parse(
            event.dataTransfer.getData(
                "text/plain"
            )
        );

    const existing =
        workspaceState.mappings.find(
            m=>m.buffer===inBuffer
        );

const mapping = {
    mappingType:"buffer",

    buffer:inBuffer,

    outCable:data.cableName,

    outBuffer:data.buffer,

    label:
        data.cableName +
        " • Buffer " +
        data.buffer,

    description:
        existing
        ? existing.description
        : "",

    status:
        existing &&
        existing.status
        ? existing.status
        : "Open"
};

    workspaceState.mappings =
        workspaceState.mappings.filter(
            m=>m.buffer!==inBuffer
        );

    workspaceState.mappings.push(
        mapping
    );

    renderInCable();
    renderPools();

}

function updateDescription(
    buffer,
    value
){

    const mapping =
        workspaceState.mappings.find(
            m=>m.buffer===buffer
        );

    if(mapping)
        mapping.description = value;
}

function updateStrandDescription(
    inBuffer,
    inStrand,
    value
){

    const mapping =
        getStrandMapping(
            inBuffer,
            inStrand
        );

    if(mapping){

        mapping.description = value;
    }
}

function isOutBufferUsed(
    cableName,
    buffer
){

    return workspaceState.mappings.some(

        m =>

            m.mappingType === "buffer"

            &&

            (
                m.outCableName === cableName ||

                m.outCable === cableName
            )

            &&

            Number(
                m.outBuffer
            ) === Number(buffer)
    );
}

function updateSplitterOutputDescription(
    splitterId,
    port,
    value
){

    const output =
        getSplitterOutput(
            splitterId,
            port
        );

    if(!output)
        return;

    output.description = value;
}

function updateStrandStatus(
    inBuffer,
    inStrand,
    value
){

    let mapping =
        getStrandMapping(
            inBuffer,
            inStrand
        );

    if(!mapping){

        mapping = {

            mappingType:"strand",

            inBuffer:inBuffer,

            inStrand:inStrand,

            outCable:null,

            outBuffer:null,

            outStrand:null,

            description:"",

            status:value
        };

        workspaceState.mappings.push(
            mapping
        );

    }else{

        mapping.status = value;
    }

    renderInCable();
}

function updateCableField(
    id,
    field,
    value
){

    let cable =
        workspaceState.outCables.find(
            c=>c.id===id
        );

    if(!cable){

        cable =
            workspaceState.throughCables.find(
                c=>c.id===id
            );
    }

    if(cable){

        cable[field] = value;
    }
}

function updateStatus(
    buffer,
    value
){

    let mapping =
        workspaceState.mappings.find(
            m=>m.buffer===buffer
        );

    if(!mapping){

        mapping = {
            buffer:buffer
        };

        workspaceState.mappings.push(
            mapping
        );
    }

    mapping.status = value;
}

async function saveClosure(){

    workspaceState.closureName =
        document.getElementById(
            "closureName"
        ).value;

    const r = await fetch(
        "/api/closure/save",
        {
            method:"POST",
            headers:{
                "Content-Type":
                "application/json"
            },
            body: JSON.stringify({
                ...workspaceState,
                id:closureId
            })
        }
    );

    const j = await r.json();

    closureId = j.id;

    alert("Saved");
}

window.onload = ()=>{

    if(workspaceState.closureName){

        document.getElementById(
            "closureName"
        ).value =
            workspaceState.closureName;

        renderAll();
    }
};

</script>
